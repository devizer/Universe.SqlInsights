name: SqlInsights Test MATRIX


env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

on:
  workflow_dispatch:
    inputs:
      ARG_INCLUDE_SSSE3:
        type: boolean
        description: 'Include Legacy SSSE3-only CPU'
        default: false
      ARG_SQL_SET_SIZE:
        type: choice
        description: 'SQL Set'
        default: 'MINI'
        options:
        - MINI
        - LOCALDB
        - FULL
      ARG_HOST_VERSION:
        type: choice
        description: 'Windows HOST'
        default: '2022'
        options:
        - '2022'
        - '2025'
        

  push:
      branches: [ "none" ]
  schedule:
      - cron: "15 4 * * *"

defaults:
  run:
    shell: pwsh


jobs:

  Pre-Build:
    name: Pre-Build for ${{ github.event.inputs.ARG_SQL_SET_SIZE }} Set
    runs-on: ubuntu-latest
    outputs:
          matrix:        ${{ steps.set-matrix.outputs.matrix }}
          SQL_SET_SIZE:  ${{ steps.set-matrix.outputs.SQL_SET_SIZE }}
          HOST_VERSION:  ${{ steps.set-matrix.outputs.HOST_VERSION }}
          # INCLUDE_SSSE3: ${{ steps.set-matrix.outputs.INCLUDE_SSSE3 }}

    defaults:
      run:
        shell: bash
    timeout-minutes: 20
    steps:
    - name: Bootstrap
      uses: devizer/devops-library@main
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Variables
      run: 'printenv | sort'
    - name: Install GNU Parallel
      run: Run-Remote-Script https://raw.githubusercontent.com/devizer/glist/master/Install-GNU-Parallel.sh

    - name: PRODUCE job matrix
      id: set-matrix
      shell: pwsh
      run: . .\.github\workflows\Set-Matrix.ps1 -SqlSetSize "${{ github.event.inputs.ARG_SQL_SET_SIZE }}" -HostVersion "${{ github.event.inputs.ARG_HOST_VERSION }}" -IncludeLegacyCpu $${{ github.event.inputs.ARG_INCLUDE_SSSE3 }}

    - name: BUILD all in parallel
      run: |
        parallel --group --halt 0 "bash -eu -o pipefail scripts/CI-Pre-Build/{} 2>&1" ::: "Pre-Build-w3app.sh" "Pre-Build-FX-Dependent.sh"

    - name: build w3app (if parallel fail)
      if: failure()
      run: bash -eu -o pipefail scripts/CI-Pre-Build/Pre-Build-w3app.sh
    - name: build fx dependent (if parallel fail)
      if: failure()
      run: bash -eu -o pipefail scripts/CI-Pre-Build/Pre-Build-FX-Dependent.sh

    - name: copy w3app to w3api/wwwroot
      run: bash -eu -o pipefail scripts/CI-Pre-Build/Copy-w3app-to-W3API-wwwroot.sh
    - name: Content of w3api
      run: ls -laR $SYSTEM_ARTIFACTSDIRECTORY/w3api || true

    - name: Pack ${{ env.SYSTEM_ARTIFACTSDIRECTORY }}
      run: |
        set -eu; set -o pipefail
        cd ${{ env.SYSTEM_ARTIFACTSDIRECTORY }}
        ls -lah
        7z a -sdel -mx=9 -ms=on -mqs=on Pre-Built-Artifact.7z
        ls -lah

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: 'Pre-Build'
        path: ${{ env.SYSTEM_ARTIFACTSDIRECTORY }}
        overwrite: true
        compression-level: 1

  # Run Window and Linux Matrix
  SQL:
    # on ${{ needs.Pre-Build.outputs.HOST_VERSION }}
    name: ${{ needs.Pre-Build.outputs.SQL_SET_SIZE }} Set
    needs: Pre-Build
    uses: ./.github/workflows/SqlInsights-TheJobsMatrix.yml
    with:
      matrix:        ${{ needs.Pre-Build.outputs.matrix }}
      SQL_SET_SIZE:  ${{ needs.Pre-Build.outputs.SQL_SET_SIZE }}
      HOST_VERSION:  ${{ needs.Pre-Build.outputs.HOST_VERSION }}
      # INCLUDE_SSSE3: ${{ needs.Pre-Build.outputs.INCLUDE_SSSE3 }}

  Combine:
    runs-on: ubuntu-latest
    needs: [Pre-Build, SQL]
    if: always()
    timeout-minutes: 45
    steps:

    - uses: actions/checkout@v6
    - uses: devizer/devops-library@main
    - name: Download all workflow run artifacts
      uses: actions/download-artifact@v8
      with:
         # name: Pre-Build
         path: ${{ env.SYSTEM_ARTIFACTSDIRECTORY }}/RAW

    - name: Combine Metrics and Pack 7z
      shell: bash
      run: | 
        set -eu; set -o pipefail
        bash -eu scripts/CI-Steps/Final-Combine-Metrics.sh
        cd ${{ env.SYSTEM_ARTIFACTSDIRECTORY }}
        cd $SYSTEM_ARTIFACTSDIRECTORY;
        cd RAW
        rm -f "Combined SqlInsights Matrix FULL on"*".7z" || rm -rf "Combined SqlInsights Matrix FULL on"*".7z" || true
        rm -rf Pre-Build
        time 7z a -md=128m -sdel -mx=8 -ms=on -mqs=on "$SYSTEM_ARTIFACTSDIRECTORY/Combined SqlInsights Matrix ${{ needs.Pre-Build.outputs.SQL_SET_SIZE }} on ${{ needs.Pre-Build.outputs.HOST_VERSION }}.7z"; 
        # Run-Remote-Script https://raw.githubusercontent.com/devizer/glist/master/Pack-each-Artifact-per-Archive.sh -9 -7z

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: 'Combined SqlInsights Matrix ${{ needs.Pre-Build.outputs.SQL_SET_SIZE }} on ${{ needs.Pre-Build.outputs.HOST_VERSION }}.7z'
        path: ${{ env.SYSTEM_ARTIFACTSDIRECTORY }}
        overwrite: true
        compression-level: 1

